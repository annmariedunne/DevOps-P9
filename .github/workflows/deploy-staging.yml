name: Stage the app

env:
  DOCKER_IMAGE_NAME: docmile-azure-ttt
  IMAGE_REGISTRY_URL: docker.pkg.github.com
  AZURE_WEBAPP_NAME: docmilo-ttt-app

on:
  pull_request: 
    types: [labeled]

jobs:
  build:
    if: contains(github.event.pull_request.labels.*.name, 'stage')
    runs-on: unbuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: npm install and build webpack
        run: |
          npm install
          npm run build
      - uses: actions/upload-artifact@v2
        with:
          name: webpack artifacts
          path: public/

  Build-Docker-Image:
    runs-on: ubuntu-latest
    needs: build
    name: Build image and store in GitHub Packages
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v2
        with:
          name: webpack artifacts
          path: public
          image-name: ${{env.DOCKER_IMAGE_NAME}}

      - name: create image and store in Packages
        uses: mattdavis0351/actions/docker-gpr@1.3.0
        with:
          repo-token: ${{secrets.GITHUB_TOKEN}}
          image-name: ${{env.DOCKER_IMAGE_NAME}}

  Deploy-to-Azure:
    runs-on: ubuntu-latest
    needs: Build-Docker-Image
    name: Deploy app ontaine to Azure
    steps: 
      - name: "Login to Azure CLI"
        uses: azure/login@v1
        with:
          creds: ${{secrets.AZURE_CREDENTIALS}}

      - uses: azure/docker-login@v1
        with:
          login-server: ${{env.AZURE_WEBAPP_NAME}}
          #images: ${{env.IMAGE_REGISTRY_URL}}/${{ github.resository }}/${{ env.DOCKER_IMAGE_NAME }}:${{github.sha}}
          images: ${{env.IMAGE_REGISTRY_URL}}/devops-p9/${{env.DOCKER_IMAGE_NAME}}:${{github.sha}}

      - name: Azure logout
        run: |
          az logout
